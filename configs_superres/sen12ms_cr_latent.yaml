
experiment:
  experiment_name: "sen12ms-cr-cloud-removal"
  exp_dir: "results/exps/sen12ms-cr/sr"

wandb:
  project: eo-vae-cloud-removal
  entity: nleh
  mode: online

trainer:
  _target_: lightning.Trainer
  max_epochs: 750
  accelerator: "gpu"
  limit_val_batches: 10
  devices: [0]
  log_every_n_steps: 20
  gradient_clip_val: 1.0


lightning_module:
  _target_: eo_vae.models.super_res.DiffusionSuperRes
  base_lr: 1e-4
  final_lr: 1e-5
  warmup_epochs: 10
  decay_end_epoch: ${trainer.max_epochs}
  optimizer:
    _target_: torch.optim.Adam
    _partial_: true
  denoiser:
    _target_: azula.denoise.SimpleDenoiser
    backbone:
      _target_: azula.nn.unet.UNet
      in_channels: 32
      out_channels: 32
      cond_channels: 64   # 32 cloudy-S2 + 32 S1
      hid_channels: [256, 128, 64]
      hid_blocks: [3, 3, 3]
      spatial: 2
    schedule:
      _target_: azula.noise.RectifiedSchedule
  sampler:
    _target_: azula.sample.DDIMSampler
    _partial_: true
    steps: 50

autoencoder:
  _target_: eo_vae.models.new_autoencoder.EOFluxVAE
  freeze_body: True
  loss_fn:
    _target_: torch.nn.Identity
  encoder:
    _target_: eo_vae.models.Encoder
    z_channels: 32
    resolution: 256
    in_channels: 3
    ch: 128
    ch_mult: [ 1,2,4,4 ]
    num_res_blocks: 2
    use_dynamic_ops: True
    dynamic_conv_kwargs:
      num_layers: 4
      wv_planes: 256

  decoder:
    _target_: eo_vae.models.Decoder
    z_channels: 32
    resolution: 256
    out_ch: 3
    ch: 128
    ch_mult: [ 1,2,4,4 ]
    num_res_blocks: 2
    use_dynamic_ops: True
    dynamic_conv_kwargs:
      num_layers: 4
      wv_planes: 256

datamodule:
  _target_: eo_vae.datasets.sen12ms_latent.SEN12MSCRLatentDataModule
  root: /path/to/sen12ms_latents
  batch_size: 16
  num_workers: 4
  normalize: True
