model:
  _target_: eo_vae.models.EOFluxVAE
  freeze_body: False
  base_lr: 1e-4

  loss_fn:
    _target_: eo_vae.models.modules.consistency_loss.EOConsistencyLoss
    rec_loss_type: "l1"
    pixel_weight: 1.0

  encoder:
    _target_: eo_vae.models.Encoder
    z_channels: 4
    resolution: 64
    in_channels: 3
    ch: 32
    ch_mult: [1, 2, 2]
    num_res_blocks: 1
    use_dynamic_ops: True
    dynamic_conv_kwargs:
      num_layers: 2
      wv_planes: 64

  decoder:
    _target_: eo_vae.models.Decoder
    z_channels: 4
    resolution: 64
    out_ch: 3
    ch: 32
    ch_mult: [1, 2, 2]
    num_res_blocks: 1
    use_dynamic_ops: True
    dynamic_conv_kwargs:
      num_layers: 2
      wv_planes: 64
